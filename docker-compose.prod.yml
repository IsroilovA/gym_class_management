# Production overrides.
# APP_IMAGE is set via environment variable by CI (exact commit SHA tag),
# or read from .env.prod as a fallback for manual use (:latest).
# Usage: docker compose --env-file .env.prod \
#          -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  db:
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app:
    image: ${APP_IMAGE}
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DEBUG: "False"
      ENVIRONMENT: production
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    build: ./nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles:ro
      - media_files:/app/mediafiles:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
