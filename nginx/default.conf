upstream django {
    server app:8000;
}

# --- Default: reject requests for unknown/uncovered hostnames ---
server {
    listen 80 default_server;
    server_name _;
    return 444;  # close connection without response
}

server {
    listen 443 ssl default_server;
    server_name _;

    # Reject TLS handshake for unknown hostnames (nginx >= 1.19.4).
    # No SSL certificate is needed with this directive, preventing startup
    # failures if certs don't exist yet (e.g., before certbot's first run).
    ssl_reject_handshake on;
}

# --- Port 80: HTTP-to-HTTPS redirect ---
server {
    listen 80;
    server_name 17102gymclasses.app;

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Port 80: www -> apex redirect ---
server {
    listen 80;
    server_name www.17102gymclasses.app;

    location / {
        return 301 https://17102gymclasses.app$request_uri;
    }
}

# --- Port 443: TLS termination + reverse proxy ---
server {
    listen 443 ssl;
    http2 on;
    server_name 17102gymclasses.app;

    # --- TLS certificates (Let's Encrypt via certbot) ---
    ssl_certificate     /etc/letsencrypt/live/17102gymclasses.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/17102gymclasses.app/privkey.pem;

    # --- Security headers ---
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # --- Logging ---
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # --- Request limits ---
    client_max_body_size 10M;

    # --- Proxy timeouts ---
    proxy_connect_timeout 60s;
    proxy_read_timeout    120s;
    proxy_send_timeout    120s;

    # --- Static files ---
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Media files ---
    location /media/ {
        alias /app/mediafiles/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # --- App proxy ---
    location / {
        proxy_pass http://django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}

# --- Port 443: www -> apex redirect ---
server {
    listen 443 ssl;
    http2 on;
    server_name www.17102gymclasses.app;

    ssl_certificate     /etc/letsencrypt/live/17102gymclasses.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/17102gymclasses.app/privkey.pem;

    return 301 https://17102gymclasses.app$request_uri;
}
