name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Prevent overlapping deployments to the same server.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Stage 1: Code Quality ──────────────────────────────────────────
  lint:
    name: Code Quality (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install flake8
        run: pip install flake8==7.1.2

      - name: Run flake8
        run: flake8 .

  # ── Stage 2: Automated Tests ───────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_pass
          DB_HOST: localhost
          DB_PORT: 5432
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "True"
        run: pytest --tb=short -q

  # ── Stage 3: Docker Build & Push ───────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # Expose the full image reference so the deploy job can use the exact tag.
    outputs:
      image: ${{ steps.meta.outputs.image }}

    env:
      IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME || github.event.repository.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        run: |
          SHA_SHORT="$(git rev-parse --short HEAD)"
          FULL_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${SHA_SHORT}"
          echo "sha_short=${SHA_SHORT}"   >> "$GITHUB_OUTPUT"
          echo "image=${FULL_IMAGE}"      >> "$GITHUB_OUTPUT"
          echo "### Docker image" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${FULL_IMAGE}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Stage 4: Deploy to Server via SSH ──────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      # Immutable image reference built in the same workflow run.
      APP_IMAGE: ${{ needs.docker.outputs.image }}
      # Server directory — configurable via GitHub variable, with sensible default.
      DEPLOY_DIR: ${{ vars.DEPLOY_DIR || '~/gym_class_management' }}

    steps:
      # ── Pull & swap app container ──────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          envs: APP_IMAGE,DEPLOY_DIR
          script: |
            set -e

            cd "$DEPLOY_DIR"

            COMPOSE="docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml"

            echo "==> Deploying image: $APP_IMAGE"
            export APP_IMAGE

            echo "==> Pulling exact commit image..."
            $COMPOSE pull app

            echo "==> Recreating app container (minimal-downtime: db & nginx stay up)..."
            $COMPOSE up -d --no-deps --wait app

            echo "==> Container state after deploy:"
            $COMPOSE ps

            echo "==> Post-deploy health check (10 retries, 5 s apart)..."
            RETRIES=10
            DELAY=5
            for i in $(seq 1 $RETRIES); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$($COMPOSE ps -q app)" 2>/dev/null || echo "unknown")
              echo "    attempt $i/$RETRIES — health: $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "==> Health check passed."
                break
              fi
              if [ "$i" -eq "$RETRIES" ]; then
                echo "==> ERROR: app did not become healthy within $((RETRIES * DELAY))s"
                exit 1
              fi
              sleep $DELAY
            done

            echo "==> Cleaning up old images..."
            docker image prune -f

            echo "==> Deployment complete!"

      # ── On failure: dump diagnostics ───────────────────────────────
      - name: Dump diagnostics on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DEPLOY_DIR
          script: |
            cd "$DEPLOY_DIR"
            COMPOSE="docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml"

            echo "========== docker compose ps =========="
            $COMPOSE ps -a

            echo ""
            echo "========== app container logs (last 80 lines) =========="
            $COMPOSE logs --tail=80 --no-color app || true

            echo ""
            echo "========== nginx container logs (last 40 lines) =========="
            $COMPOSE logs --tail=40 --no-color nginx || true
